---
- name: package
  community.general.npm:
    name: "@google/gemini-cli"
    state: latest
    global: true
  tags: user

- name: folder
  ansible.builtin.file:
    path: "~/.gemini/"
    state: directory
    mode: "0755"
  tags: user

- name: settings
  ansible.builtin.file:
    src: "{{ role_path }}/files/settings.json"
    dest: ~/.gemini/settings.json
    state: link
    force: true
  tags: user

- name: instructions
  ansible.builtin.file:
    src: "{{ role_path }}/files/GEMINI.md"
    dest: ~/.gemini/GEMINI.md
    state: link
    force: true
  tags: user

- name: components
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: ~/.gemini/{{ item }}
    state: link
    force: true
  loop:
    - agents
    - commands
    - skills
  tags: user

- name: extensions
  ansible.builtin.shell: |
    gemini extensions install --consent --auto-update {{ item }}
  loop:
    - https://github.com/googleworkspace/cli
    - https://github.com/gemini-cli-extensions/conductor
  register: install_result
  changed_when: "'Successfully installed' in install_result.stdout"
  failed_when:
    - install_result.rc != 0
    - "'is already installed' not in install_result.stderr"
  tags: user

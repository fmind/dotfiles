[settings]
github_attestations = false
lockfile = true
slsa = false

[settings.task]
run_auto_install = false

[tools]
age = "latest"
chezmoi = "latest"
neovim = "latest"
pre-commit = "latest"

[tasks.apply]
alias = "a"
description = "Apply with chezmoi"
run = "chezmoi apply --init"

[tasks.check]
alias = "c"
description = "Preview chezmoi changes"
run = "chezmoi apply --dry-run --init"

[tasks.diff]
alias = "d"
description = "Show pending chezmoi diff"
run = "chezmoi diff --init"

[tasks.full]
alias = "f"
depends = ["trust", "apply", "hooks", "tools", "vim"]
description = "Full first-time setup"
run = "echo '✓ Full setup complete.'"

[tasks.hooks]
alias = "h"
description = "Install repository pre-commit hooks"
run = "pre-commit install"

[tasks.init]
alias = "i"
description = "Initialize/regenerate chezmoi config"
run = "chezmoi init --source \"$PWD\""

[tasks.lock]
alias = "l"
description = "Refresh repository and home mise lockfiles"
run = ["mise lock", "mise -C dot_config/mise lock"]

[tasks.lint]
alias = "n"
description = "Run pre-commit on all files"
run = "pre-commit run --all-files"

[tasks.doctor]
alias = "o"
description = "Run chezmoi/mise health checks"
run = ["chezmoi doctor", "mise doctor"]

[tasks.prune]
alias = "p"
description = "Remove unused mise packages and clear cache"
run = ["mise prune -y", "mise cache clear"]

[tasks.tools]
alias = "t"
depends = ["apply"]
description = "Install global tools from ~/.config/mise/config.toml"
run = ["mise -C \"$HOME\" install -y"]

[tasks.trust]
alias = "r"
description = "Trust this repository and home mise configurations"
run = [
  "mise trust -y mise.toml",
  "mise trust -y dot_config/mise/config.toml",
  "mise trust -y ~/.config/mise/config.toml",
]

[tasks.upgrade]
alias = "u"
depends_post = ["lock", "apply", "tools"]
description = "Upgrade mise tools to latest versions"
run = ["mise -C dot_config/mise upgrade --bump", "mise upgrade --bump"]

[tasks.vim]
alias = "v"
description = "Install/sync Neovim plugins headlessly with LazyVim"
run = "nvim --headless '+Lazy! restore' +qa"

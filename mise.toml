[env]
_.path = "~/.local/share/chezmoi/dot_local/bin"

[settings]
github_attestations = false
locked_verify_provenance = false
lockfile = true
lockfile_platforms = ["linux-x64", "macos-arm64"]
slsa = false

[settings.task]
run_auto_install = false

[task_config]
# Default to the repo, but honour the CI checkout path when running on GitHub.
dir = "{{ env.GITHUB_WORKSPACE | default(value='~/.local/share/chezmoi') }}"

[tools]
"aqua:fish-shell/fish-shell" = "4"
chezmoi = "latest"
dprint = "latest"
gitleaks = "latest"
go = "1.26"
golangci-lint = "latest"
gotestsum = "latest"
lefthook = "latest"
ruff = "latest"
shellcheck = "latest"
shfmt = "latest"

# ─────────────────────────────────────────────────────────────────────────────
# Project management — check quality, format sources, and run tests.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.all]
alias = "ma"
description = "Run the full pre-commit and pre-push gate"
run = [
  "lefthook run pre-commit --all-files",
  "lefthook run pre-push --all-files < /dev/null",
]

[tasks.check]
alias = "mc"
description = "Run all static checks in parallel"
depends = [
  "check:dprint",
  "check:go",
  "check:python",
  "check:shell",
  "check:leaks",
]

[tasks."check:dprint"]
alias = "mcd"
description = "Check config/markup formatting (dprint)"
run = "dprint check"

[tasks."check:go"]
alias = "mcg"
description = "Lint and vuln-scan the Go module (dot/)"
run = ["mise -C dot run check:lint", "mise -C dot run check:vuln"]

[tasks."check:leaks"]
alias = "mcl"
description = "Audit codebase for leaked secrets (gitleaks)"
run = "gitleaks git --log-opts=\"--max-count=100\" --verbose"

[tasks."check:python"]
alias = "mcp"
description = "Lint Python sources (ruff)"
run = "ruff check"

[tasks."check:shell"]
alias = "mcs"
description = "Lint shell scripts (shellcheck)"
run = "git ls-files '*.sh' | xargs -r shellcheck"

[tasks.format]
alias = "mf"
description = "Format all sources and documents"
depends = ["format:dprint", "format:go", "format:python", "format:shell"]

[tasks."format:dprint"]
alias = "mfd"
description = "Format JSON, Markdown, TOML, YAML with dprint"
run = "dprint fmt"

[tasks."format:go"]
alias = "mfg"
description = "Format Go sources and imports (goimports + gofumpt)"
# go.work resolves the tools from dot/go.mod; run from root so repo-relative
run = ["go tool goimports -w dot", "go tool gofumpt -w dot"]

[tasks."format:python"]
alias = "mfp"
description = "Format Python sources and imports (ruff)"
run = ["ruff check --select=I --fix .", "ruff format ."]

[tasks."format:shell"]
alias = "mfs"
description = "Format shell scripts (shfmt)"
run = "git ls-files '*.sh' | xargs -r shfmt -w -i 2 -s"

[tasks.test]
alias = "mt"
description = "Run the dot CLI test suite (delegates to dot/)"
run = "mise -C dot run test"

# ─────────────────────────────────────────────────────────────────────────────
# Dotfiles management — chezmoi orchestration, tool sync, and bootstrap.
# ─────────────────────────────────────────────────────────────────────────────

[tasks.apply]
alias = "a"
depends = ["build"]
description = "Apply dotfiles with chezmoi"
run = "chezmoi apply --force"

[tasks.build]
alias = "b"
description = "Build the dot CLI binary"
run = "go build -C dot -o ../dot_local/bin/executable_dot ./cmd/dot"
sources = ["dot/go.mod", "dot/go.sum", "dot/**/*.go"]
outputs = ["dot_local/bin/executable_dot"]

[tasks.completions]
alias = "g"
depends = ["build"]
description = "Generate Fish completions for core CLI tools and cached integrations"
run = "executable_dot completion"

[tasks.diff]
alias = "d"
description = "Show pending chezmoi diff"
run = "chezmoi diff --force"

[tasks.doctor]
alias = "o"
description = "Run chezmoi/mise health checks"
run = ["chezmoi doctor", "mise doctor"]

[tasks.full]
alias = "f"
depends = ["apply", "tools"]
description = "Apply dotfiles and sync global tools"
run = "echo '✓ Dotfiles deployed.'"

[tasks.hooks]
alias = "h"
description = "Install repository Git hooks (Lefthook)"
run = "lefthook install"

[tasks.init]
alias = "i"
depends = ["trust", "tools", "hooks", "vim", "krew"]
description = "Bootstrap a freshly initialized checkout"
run = "echo '✓ First-time bootstrap complete.'"

[tasks.krew]
alias = "w"
description = "Install core kubectl plugins (krew)"
run = "krew install neat tree df-pv view-allocations view-secret sniff"

[tasks.lock]
alias = "k"
description = "Refresh the repo and home mise lockfiles"
run = [
  "mise lock --yes",
  "mise lock --global --yes",
  "chezmoi re-add --source \"$PWD\" ~/.config/mise/mise.lock",
]

[tasks.preview]
alias = "pr"
description = "Preview pending chezmoi changes (dry-run apply)"
run = "chezmoi apply --dry-run --force"

[tasks.prune]
alias = "p"
description = "Remove unused tools, containers, and development caches"
run = "executable_prune-system.sh"

[tasks.release]
alias = "r"
depends = ["build"]
description = "Bump version, update CHANGELOG, and publish a GitHub release"
run = "executable_dot release"

[tasks.skills]
alias = "sk"
description = "Update all global agent skills"
run = "skills update -g -y"

[tasks.tools]
alias = "t"
depends = ["apply"]
depends_post = ["completions"]
description = "Install pinned tools for this repo and the global config"
run = ["mise -C \"$HOME\" install -y", "mise install -y"]

[tasks.trust]
alias = "tr"
description = "Trust repo and home mise configs"
run = ["mise trust -y mise.toml", "mise trust -y ~/.config/mise/config.toml"]

[tasks.upgrade]
alias = "u"
description = "Upgrade mise tools to latest versions"
run = [
  "mise -C \"$HOME\" upgrade --bump --exclude tree-sitter --exclude github:googleworkspace/cli",
  "mise upgrade --bump --local",
  "mise run lock",
  "mise run apply",
  "mise run tools",
]

[tasks.verify]
alias = "x"
depends = ["build"]
description = "Run the dotfiles sanity check suite"
run = "executable_dot verify"

[tasks.vim]
alias = "v"
description = "Sync Neovim plugins headlessly (LazyVim)"
run = "nvim --headless '+Lazy! restore' +qa"

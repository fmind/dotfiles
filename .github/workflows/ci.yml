name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install toolchain
        uses: jdx/mise-action@v4
        with:
          cache: true
      - name: Run formatters
        run: mise run format
      - name: Run checkers
        run: mise run check
      - name: Run testers
        run: mise run test
      - name: Verify clean tree
        run: test -z "$(git status --porcelain)"

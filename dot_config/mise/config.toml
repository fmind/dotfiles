[settings]
always_keep_download = false
legacy_version_file = true

[tools]
"npm:@google/gemini-cli" = "latest"         # Gemini CLI (TypeScript)
"npm:@googleworkspace/cli" = "latest"       # Workspace CLI (TypeScript)
"npm:@johnnymorganz/stylua-bin" = "latest"  # Lua formatter (JavaScript package)
"npm:lighthouse" = "latest"                 # Web performance auditor (JavaScript)
"npm:prettier" = "latest"                   # Markdown/YAML formatter (JavaScript)
"pipx:ptpython" = "latest"                  # Advanced Python REPL (Python)
"pipx:ruff" = "latest"                      # Fast Python linter/formatter (Python package)
"pipx:yamllint" = "latest"                  # YAML linter (Python)
bat = "latest"                              # Syntax-highlighting cat alternative (Rust)
btop = "latest"                             # Visual system resource monitor (C++)
chezmoi = "latest"                          # Dotfiles manager (Go)
delta = "latest"                            # Syntax-highlighting pagination (Rust)
doggo = "latest"                            # Modern DNS client (Go)
duf = "latest"                              # Disk usage and free space utility (Go)
dust = "latest"                             # Intuitive du alternative (Rust)
eza = "latest"                              # Modern ls replacement (Rust)
fastfetch = "latest"                        # System info fetching tool (C)
fd = "latest"                               # Fast find alternative (Rust)
fzf = "latest"                              # Command-line fuzzy finder (Go)
gcloud = "latest"                           # Google Cloud platform CLI (Python)
gh = "latest"                               # Official GitHub CLI (Go)
go = "latest"                               # Go language runtime (Go)
hugo = "latest"                             # Static site generator (Go)
jq = "latest"                               # Command-line JSON processor (C)
k9s = "latest"                              # Terminal UI for Kubernetes (Go)
lazydocker = "latest"                       # Terminal UI for Docker (Go)
lazygit = "latest"                          # Terminal UI for Git (Go)
neovim = "latest"                           # Modern Vim-based editor (C)
node = "latest"                             # JavaScript runtime (C++)
pre-commit = "latest"                       # Git hooks manager (Python)
python = "latest"                           # Python programming language (C)
ripgrep = "latest"                          # Fast recursive grep alternative (Rust)
starship = "latest"                         # Customizable cross-shell prompt (Rust)
terraform = "latest"                        # Infrastructure-as-code tool (Go)
uv = "latest"                               # Fast Python package installer (Rust)
xh = "latest"                               # Fast HTTP request tool (Rust)
yazi = "latest"                             # Fast terminal file manager (Rust)
yq = "latest"                               # YAML/JSON/XML processor (Go)
zellij = "latest"                           # Terminal multiplexer and workspace (Rust)
zoxide = "latest"                           # Smarter cd command (Rust)

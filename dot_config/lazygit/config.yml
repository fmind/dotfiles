disableStartupPopups: true
git:
  autoFetch: false
  parseEmoji: false
  diffContextSize: 7
  paging:
    colorArg: always
    pager: delta --dark --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="file://{path}"
gui:
  expandFocusedSidePanel: true
  expandedSidePanelWeight: 2
  nerdFontsVersion: ""
  scrollHeight: 5
  scrollPastBottom: false
  showFileTree: true
  showIcons: false
  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#94e2d5"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
os:
  editPreset: nvim
customCommands:
  - key: "G"
    context: "files"
    description: "Generate Conventional Commit message with Gemini"
    loadingText: "Asking Gemini..."
    subprocess: true
    command: |
      set -e
      diff=$(git diff --cached)
      use_all=0
      if [ -z "$diff" ]; then
        diff=$(git diff)
        if [ -z "$diff" ]; then echo "No changes to commit."; exit 1; fi
        printf "No staged changes. Generate from working tree (tracked files)? [y/N] "
        read -r reply
        case "$reply" in [yY]*) use_all=1 ;; *) echo "Aborted."; exit 1 ;; esac
      fi
      msg=$(printf '%s' "$diff" | head -c 200000 | gemini -p "Write ONE Conventional Commits message for this diff. Format: type(scope): subject, then a blank line and a short body if useful. Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert. Output ONLY the message, no code fences, no preamble.")
      if [ -z "$msg" ]; then echo "Gemini returned empty message."; exit 1; fi
      if [ "$use_all" = "1" ]; then
        git commit -a -e -m "$msg"
      else
        git commit -e -m "$msg"
      fi

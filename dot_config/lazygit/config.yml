disableStartupPopups: true
git:
  autoFetch: false
  parseEmoji: false
  paging:
    colorArg: always
    pager: delta --dark --paging=never
gui:
  showIcons: false
  showFileTree: true
  nerdFontsVersion: ""
  theme:
    activeBorderColor:
      - '#cba6f7'
      - bold
    inactiveBorderColor:
      - '#a6adc8'
    optionsTextColor:
      - '#89b4fa'
    selectedLineBgColor:
      - '#313244'
    cherryPickedCommitBgColor:
      - '#94e2d5'
    cherryPickedCommitFgColor:
      - '#cba6f7'
    unstagedChangesColor:
      - '#f38ba8'
    defaultFgColor:
      - '#cdd6f4'
os:
  editPreset: nvim
customCommands:
  - key: 'G'
    context: 'files'
    description: 'Generate Conventional Commit message with Gemini'
    loadingText: 'Asking Gemini...'
    subprocess: true
    command: |
      diff=$(git diff --cached);
      if [ -z "$diff" ]; then echo "No staged changes."; exit 1; fi;
      msg=$(printf '%s' "$diff" | gemini -p "Write ONE Conventional Commits message for this staged diff. Format: type(scope): subject, then a blank line and a short body if useful. Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert. Output ONLY the message, no code fences, no preamble.") &&
      git commit -e -m "$msg"

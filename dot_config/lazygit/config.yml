disableStartupPopups: true
git:
  diffContextSize: 7
  pagers:
    - pager: delta --paging=never
      colorArg: always
gui:
  expandFocusedSidePanel: true
  scrollHeight: 5
  scrollPastBottom: false
  showCommandLog: false
  nerdFontsVersion: "3"
os:
  editPreset: nvim
customCommands:
  - key: "G"
    context: "files"
    description: "Generate Conventional Commit message with Antigravity (agy)"
    loadingText: "Asking Antigravity..."
    output: terminal
    command: "git g"

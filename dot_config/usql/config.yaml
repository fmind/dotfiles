connections:
  lt: sqlite3://./local.db
  pg: postgres://postgres@localhost:5432/postgres?sslmode=disable
init: |
  -- Enable and style syntax highlighting
  \set SYNTAX_HL on
  \set SYNTAX_HL_STYLE tokyonight-moon

  -- Stop executing scripts immediately if an error occurs
  \set ON_ERROR_STOP on

  -- Show query execution time in the footer
  \timing on

  -- Hide noisy host and database engine details on startup for a cleaner CLI
  \set SHOW_HOST_INFORMATION false

  -- Format numbers with locale-specific grouping (thousands separators)
  \pset numericlocale on

  -- Distinguish SQL NULL from an empty string
  \pset null '∅'

  -- Premium table layout and beautiful Unicode grid formatting
  \pset border 2
  \pset format aligned
  \pset linestyle unicode
  \pset unicode_border_linestyle single
  \pset unicode_column_linestyle single
  \pset unicode_header_linestyle single

  -- Clean, professional prompt showing: connection-alias/db=>
  -- %M: host, %/: database name, %R: status/slash, %#: prompt character
  \set PROMPT1 '\033[36m%M\033[0m/\033[32m%/\033[0m%R%# '

"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"

add_newline = false
format = '$directory$git_branch$git_status$cmd_duration$character'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'
vimcmd_replace_one_symbol = '[❮](bold mauve)'
vimcmd_replace_symbol = '[❮](bold mauve)'
vimcmd_visual_symbol = '[❮](bold yellow)'

[directory]
read_only = ' \[ro\]'

[git_branch]
symbol = '\[git\] '

[git_status]
ahead = '>'
behind = '<'
diverged = '<>'
renamed = 'r'
deleted = 'x'

[python]
symbol = '\[py\] '
format = '[$symbol($virtualenv )]($style)'
style = 'yellow'

[nodejs]
symbol = '\[node\] '
format = '[$symbol($version )]($style)'
detect_files = ['package.json', '.nvmrc']
style = 'green'

[golang]
symbol = '\[go\] '
format = '[$symbol($version )]($style)'
style = 'cyan'

[terraform]
symbol = '\[tf\] '
format = '[$symbol$workspace ]($style)'
style = 'mauve'

[gcloud]
symbol = '\[gcp\] '
format = '[$symbol$project]($style) '
style = 'blue'
disabled = false

[kubernetes]
symbol = '\[k8s\] '
format = '[$symbol$context( \($namespace\))]($style) '
style = 'sapphire'
disabled = false

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

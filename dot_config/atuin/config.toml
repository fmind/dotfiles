# Search behavior
enter_accept = true
inline_height = 0
style = "compact"

# Privacy: no sync
auto_sync = false
update_check = false

# Workspace-aware history
workspaces = true

# Built-in secrets filter
secrets_filter = true

# Filter sensitive commands
history_filter = [
    "^export .*(TOKEN|SECRET|PASSWORD|KEY|CREDENTIAL)",
    "^set -gx .*(TOKEN|SECRET|PASSWORD|KEY|CREDENTIAL)",
]

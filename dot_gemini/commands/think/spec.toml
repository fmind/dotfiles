description = "Create a proper spec from the provided input or previous conversation."

prompt = """
Write a comprehensive specification based on `{{args}}` or our previous conversation.

Requirements:
1. Treat `{{args}}` as the input description. If empty, derive the spec from the previous conversation. If neither is available, ask for input and stop.
2. Inspect the relevant repository code and constraints before writing.
3. Structure the spec in Markdown with these sections:
## Summary
A clear, high-level summary.
## Requirements
Detailed functional and non-functional requirements and constraints.
## Architecture
Proposed technical architecture or approach.
## Milestones
A breakdown of the major implementation steps, each independently shippable.
4. Use precise, technical language. No marketing tone.
5. Do not edit files unless the user explicitly asks for the spec to be saved.
"""

description = "Brainstorm a topic by listing 10 divergent angles, from conventional to contrarian."

prompt = """
Brainstorm angles or options for `{{args}}`.

Requirements:
1. Treat `{{args}}` as a topic, problem, or open-ended question.
2. Produce exactly 10 distinct ideas, each one or two sentences.
3. Order them from most conventional (1) to most contrarian or unusual (10).
4. Cover different axes across the list: technical, organizational, product, user, economic, contrarian.
5. Do not merge ideas into a single recommendation or rank them by quality.
6. Make reasonable assumptions instead of asking clarifying questions; note any assumption in one short line at the end.
7. Do not edit files.
"""

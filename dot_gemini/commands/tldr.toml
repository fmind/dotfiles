description = "Summarize a long file, PR, log, or transcript fast."

prompt = """
Summarize `{{args}}` for a reader catching up quickly.

Requirements:
1. Treat `{{args}}` as a path, PR or commit ref, log, error dump, or pasted text. If empty, ask what to summarize and stop.
2. Read the source in full before summarizing. For PRs and commits, use `git show` or `gh pr view`.
3. Open with a 3-bullet executive summary. Each bullet is one short sentence.
4. Follow with a denser "key points" list grouped by topic when useful (changes, decisions, risks, open questions).
5. Preserve concrete details: file names, numbers, error codes, identifiers. Drop filler.
6. No prose paragraphs. No introduction. No closing remarks.
7. Be concise.
"""

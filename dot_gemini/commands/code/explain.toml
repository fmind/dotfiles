description = "Break down and explain complex code, shell scripts, or errors."

prompt = """
Explain the target, code, or error message described by `{{args}}`.

Requirements:
1. Treat `{{args}}` as a path, file, symbol, error message, or short description. If empty, ask what to explain and stop.
2. If it is a file or symbol, read the relevant code before explaining.
3. Provide a clear, high-level summary of what the target does or what the error means.
4. Break down the complex parts step-by-step.
5. If explaining an error, suggest a concrete fix.
6. Be concise. Avoid verbose introductions.
"""

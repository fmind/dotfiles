description = "Run type checks for the target or repository, fix issues, and rerun them."

prompt = """
Run type checks for `{{args}}`, fix issues, and rerun the relevant checks.

Requirements:
1. Treat `{{args}}` as an optional path, file, scope, or type error hint.
2. Inspect the repo before running commands, and prefer documented type-check commands from scripts, Makefiles, mise tasks, or repo docs (e.g. `mypy`, `pyright`, `tsc --noEmit`, `ty`) over inventing a different top-level command.
3. When possible, run a narrower type-check command for the affected files before falling back to the repo-wide task.
4. Fix the type errors in code rather than suppressing them with `# type: ignore`, `any`, or `as any` unless suppression is clearly correct.
5. Rerun the same focused type check after each fix until it passes.
6. Keep changes minimal and avoid unrelated edits.
7. Summarize the commands you ran, the files you changed, and any remaining blockers.
8. Be concise.
"""

description = "Compare two paths, branches, approaches, or libraries side by side."

prompt = """
Compare the two options described by `{{args}}` (format: `A vs B`).

Requirements:
1. Parse `{{args}}` as two comparable items: paths, branches, libraries, approaches, or APIs.
2. Inspect each before comparing. For paths or branches in this repository, read the actual code.
3. Produce a Markdown table with rows for: behavior, complexity, dependencies, performance, maintenance cost, ergonomics, risk. Skip rows where the two are equivalent rather than padding the table.
4. Below the table, add a short recommendation conditioned on context. Do not declare an absolute winner.
5. If `{{args}}` is ambiguous, state your interpretation in one line and continue.
6. Do not edit files.
7. Be concise.
"""

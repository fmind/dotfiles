description = "Reflect on recent session history (last 24h by default) to distill durable artifacts."

prompt = """
Analyze my recent chat history from the last {{args | default("24 hours")}} to identify recurring patterns, friction points, or useful discoveries.

Use the `reflect-on-history` skill to:

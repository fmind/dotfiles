description = "Generate a Mermaid diagram to visualize architecture, flow, or state."

prompt = """
Generate a Mermaid diagram for `{{args}}`.

Requirements:
1. Treat `{{args}}` as a path, subsystem, architecture concept, or workflow to visualize.
2. Inspect the relevant code or context to understand the relationships and flows.
3. Output a valid, well-structured Mermaid.js diagram block.
4. Ensure the diagram is clean, idiomatic, and logically organized.
5. Provide a brief 1-2 sentence explanation of what the diagram represents.
"""
